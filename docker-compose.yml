version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vpn-shield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpnshield
      POSTGRES_USER: vpnshield
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vpn-shield-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vpn-shield-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vpn-shield-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: vpn-shield-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=vpnshield
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=vpnshield
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - SERVER_PORT=8080
      - XRAY_PATH=/usr/local/bin/xray
      - HYSTERIA_PATH=/usr/local/bin/hysteria
    volumes:
      - ./xray-configs:/app/xray-configs
      - ./hysteria-configs:/app/hysteria-configs
      - xray_data:/var/lib/xray
      - hysteria_data:/var/lib/hysteria
    ports:
      - "8080:8080"
      # Xray ports
      - "443:443"
      - "8443:8443"
      # Hysteria2 ports
      - "36712:36712/udp"
      # Trojan ports
      - "8444:8444"
    networks:
      - vpn-shield-network
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: vpn-shield-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8080
    ports:
      - "3000:80"
    networks:
      - vpn-shield-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vpn-shield-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
      - "8888:8888"  # Admin panel
    networks:
      - vpn-shield-network

volumes:
  postgres_data:
  redis_data:
  xray_data:
  hysteria_data:
  nginx_logs:

networks:
  vpn-shield-network:
    driver: bridge
